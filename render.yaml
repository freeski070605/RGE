services:
  - type: web
    name: rge-api
    env: node
    plan: starter
    buildCommand: npm install --include=optional && npm run build
    startCommand: npm start
    healthCheckPath: /api/hq/system-health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REEMTEAM_MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: HQ_INTERNAL_TOKEN
        sync: false
      - key: OPERATOR_EMAIL
        sync: false
      - key: OPERATOR_PASSWORD
        sync: false
